<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تفوّق | سما ومحمد 2026</title>
    <!-- خط Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a0a;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
            background-image: radial-gradient(circle at 10% 20%, #132c3b 0%, #050505 90%);
        }

        /* تأثيرات عامة */
        .gold-glow {
            color: #FFD966;
            text-shadow: 0 0 12px rgba(255, 215, 0, 0.7), 0 0 25px rgba(255, 200, 0, 0.4);
        }

        .app-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 16px 8px;
            width: 100%;
            flex: 1;
        }

        /* الصفحة الرئيسية */
        .landing {
            display: flex;
            flex-direction: column;
        }

        .hero-title {
            text-align: center;
            margin: 20px 0 8px;
            font-size: clamp(2rem, 8vw, 3.2rem);
            font-weight: 900;
            letter-spacing: 2px;
        }

        .hero-title i {
            margin: 0 8px;
            color: #4fc3f7;
        }

        .subhead {
            text-align: center;
            color: #b0c7d9;
            margin-bottom: 30px;
            font-size: 1.2rem;
            border-bottom: 1px solid #2a3c4a;
            padding-bottom: 18px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 22px;
            margin: 20px 0 30px;
        }

        .exam-card {
            background: #10181f;
            border-radius: 32px;
            padding: 25px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            border: 1px solid #263b48;
            box-shadow: 0 12px 18px -8px #000000cc;
            backdrop-filter: blur(2px);
            position: relative;
            overflow: hidden;
        }

        .exam-card:hover {
            transform: translateY(-5px);
            border-color: #3f9ad1;
            box-shadow: 0 0 22px #1e88e555, 0 10px 20px -5px black;
        }

        .card-badge {
            font-size: 4.2rem;
            font-weight: 900;
            color: #1e3b4f;
            text-shadow: 0 0 8px #00a3ff;
            line-height: 1;
        }

        .exam-card h3 {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 5px 0 8px;
        }

        .sci-icon-set {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 10px 0 4px;
            color: #6ab7e0;
            font-size: 1.6rem;
        }

        /* رسائل تشجيعية عائمة */
        .toast-message {
            position: fixed;
            bottom: 25px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            background: #1a2f3e;
            border-right: 8px solid #fbc02d;
            border-radius: 50px;
            padding: 16px 22px;
            box-shadow: 0 10px 30px #000000b3;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid #f1c40f80;
            animation: slideIn 0.3s ease;
            font-weight: 700;
            font-size: 1.2rem;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* عرض الاختبار */
        .quiz-view {
            background: #0c141c;
            border-radius: 40px;
            padding: 22px 22px 28px;
            border: 1px solid #2c5068;
            box-shadow: 0 20px 40px #000000;
            margin-bottom: 20px;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
            border-bottom: 1px dashed #3a6c89;
            padding-bottom: 15px;
        }

        .quiz-header h2 {
            font-weight: 800;
            font-size: 1.9rem;
        }

        .progress-pill {
            background: #1b384b;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            color: #c6e2ff;
            border: 1px solid #3f9ad1;
        }

        .question-card {
            background: #0f1e28;
            border-radius: 28px;
            padding: 25px 22px;
            margin: 18px 0;
            border-right: 8px solid #2e8ab8;
        }

        .meta-lesson {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 18px;
            color: #aad0f5;
        }

        .meta-lesson i {
            font-size: 1.8rem;
            color: #f4c542;
        }

        .q-text {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 28px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .opt-item {
            background: #13232e;
            border-radius: 20px;
            padding: 16px 22px;
            border: 1.5px solid #2a4b60;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .opt-item.selected {
            background: #1d577a;
            border-color: #7bc4f0;
            box-shadow: 0 0 14px #2196f3;
        }

        .opt-item input[type="radio"] {
            accent-color: #fdd835;
            width: 22px;
            height: 22px;
        }

        textarea {
            width: 100%;
            background: #0f1c26;
            border: 2px solid #2d688b;
            border-radius: 24px;
            padding: 20px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            resize: vertical;
            min-height: 150px;
        }

        .essay-toolbar {
            margin: 20px 0 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn {
            background: #1d3e53;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #3b799b;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 8px #00000040;
        }

        .btn-gold {
            background: #9b7e2c;
            border-color: #f1c40f;
            color: #000;
            font-weight: 900;
            box-shadow: 0 0 20px #f1c40f80;
        }

        .btn-primary {
            background: #1f6996;
            border-color: #7bc4f0;
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin: 30px 0 15px;
        }

        .result-container {
            background: #0e1b24;
            border-radius: 30px;
            padding: 28px 22px;
            margin-top: 30px;
        }

        .honor-text {
            font-size: 3rem;
            text-align: center;
            font-weight: 900;
        }

        .mistake-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #071017;
            border-radius: 24px;
            overflow: hidden;
        }

        .mistake-table th {
            background: #1a445c;
            color: #FFD966;
            padding: 14px 8px;
        }

        .mistake-table td {
            padding: 12px 8px;
            border-bottom: 1px solid #2b5570;
        }

        .hidden {
            display: none !important;
        }

        .back-btn {
            margin-top: 25px;
            text-align: center;
        }

        .footer-note {
            text-align: center;
            padding: 12px 0 5px;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .inline-answer-box {
            background: #10222e;
            padding: 18px;
            border-radius: 20px;
            margin: 20px 0;
            border-right: 6px solid #fbc02d;
        }

        /* للتجاوب */
        @media (max-width: 600px) {
            .q-text { font-size: 1.2rem; }
            .quiz-header { flex-direction: column; align-items: start; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <!-- الصفحة الرئيسية -->
    <div id="landingSection" class="landing">
        <div class="hero-title">
            <i class="fas fa-flask"></i> منصّة <span class="gold-glow">تفوّق</span> <i class="fas fa-dna"></i>
        </div>
        <div class="subhead">اختر أحد الاختبارات الستة · 18 سؤال + 2 مقالي</div>
        <div class="cards-grid" id="examCardsContainer"></div>
    </div>

    <!-- واجهة الاختبار -->
    <div id="quizSection" class="quiz-view hidden">
        <div class="quiz-header">
            <h2 id="examTitleDisplay">الاختبار</h2>
            <div class="progress-pill" id="progressDisplay">1 / 20</div>
        </div>
        <div id="questionPanel" class="question-card"></div>
        <div class="nav-controls">
            <button class="btn" id="prevQuestionBtn" disabled><i class="fas fa-chevron-right"></i> السابق</button>
            <button class="btn" id="nextQuestionBtn">التالي <i class="fas fa-chevron-left"></i></button>
        </div>
        <div style="display: flex; justify-content: center;">
            <button class="btn btn-gold" id="finishExamBtn"><i class="fas fa-trophy"></i> إنهاء وعرض النتيجة</button>
        </div>
        <div id="resultPanel" class="result-container hidden"></div>
        <div class="back-btn">
            <button class="btn" id="backToHomeBtn"><i class="fas fa-home"></i> الرئيسية</button>
        </div>
    </div>
    <div class="footer-note">
        <span class="gold-glow"><i class="fas fa-crown"></i> Sama&Mohamed 2026 <i class="fas fa-crown"></i></span>
    </div>
</div>

<!-- حاوية رسائل التشجيع -->
<div id="motivationToast" style="display: none;"></div>

<script>
    (function() {

        // ------------------- بنك الأسئلة الشامل (MCQ + مقالي) -------------------

            { text: "المادة التي يدل زيادة تركيزها في الدم على فشل كلوي:", options: ["اليوريا", "الجلوكوز", "الكرياتين", "حمض البول"], answer: 0, lesson: "وظائف الكلية" },

            { text: "مركز معالجة السموم في الجسم:", options: ["الكلية", "الكبد", "البنكرياس", "الطحال"], answer: 1, lesson: "الكبد" },

            { text: "تبدأ دورة الكربون في الطبيعة بعملية:", options: ["التنفس", "البناء الضوئي", "الاحتراق", "التحلل"], answer: 1, lesson: "دورة الكربون" },

            { text: "إنزيم يحطم الأستيل كولين:", options: ["لايبيز", "كولين استيريز", "أميليز", "ببسين"], answer: 1, lesson: "التشابك العصبي" },

        // ---------- إعداد الاختبارات الستة (عشوائياً) ----------
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function generateSixExams() {
            const exams = [];
            const mcqCopy = shuffle([...mcqBank]);
            const essayCopy = shuffle([...essayBank]);
            let mcqIndex = 0, essayIndex = 0;
            for (let i = 0; i < 6; i++) {
                const examQuestions = [];
                for (let j = 0; j < 18; j++) {
                    examQuestions.push({ ...mcqCopy[mcqIndex % mcqCopy.length], type: 'mcq' });
                    mcqIndex++;
                }
                for (let k = 0; k < 2; k++) {
                    examQuestions.push({ ...essayCopy[essayIndex % essayCopy.length], type: 'essay' });
                    essayIndex++;
                }
                exams.push({ name: `الاختبار ${i+1}`, questions: examQuestions });
            }
            return exams;
        }

        const exams = generateSixExams();

        // ---------- حالة التطبيق ----------
        let currentExamIndex = 0;
        let currentQIndex = 0;
        let userAnswers = [];
        let examFinished = false;
        let currentQuestions = [];
        let toastInterval;

        const landing = document.getElementById('landingSection');
        const quizSection = document.getElementById('quizSection');
        const examTitleDisplay = document.getElementById('examTitleDisplay');
        const questionPanel = document.getElementById('questionPanel');
        const prevBtn = document.getElementById('prevQuestionBtn');
        const nextBtn = document.getElementById('nextQuestionBtn');
        const finishBtn = document.getElementById('finishExamBtn');
        const resultPanel = document.getElementById('resultPanel');
        const progressDisplay = document.getElementById('progressDisplay');
        const backHomeBtn = document.getElementById('backToHomeBtn');
        const toastDiv = document.getElementById('motivationToast');

        // رسائل تشجيعية لـ سما
        const cheerMessages = [
            "💪 يا سمسمة أنتِ قدها! كملي واثقة.",
            "🌟 شطورة يا سما، بكرة هتشوفي أحلى دكتورة.",
            "📚 لو غلطتي تعلمي، أنا ضهرك وسندك.",
            "❤️ واثق فيكي يا سما، كملي الأبطال.",
            "🏆 يا بطلة، كل سؤال بيقربك من حلمك.",
            "✨ أنتِ أذكى مما تتخيلي، يا دكتورة المستقبل."
        ];

        function showToast(text) {
            toastDiv.style.display = 'block';
            toastDiv.className = 'toast-message';
            toastDiv.innerHTML = `<i class="fas fa-heart" style="color:#ff4d6d;"></i> ${text}`;
            setTimeout(() => { toastDiv.style.display = 'none'; }, 4000);
        }

        function startMotivationTimer() {
            if (toastInterval) clearInterval(toastInterval);
            toastInterval = setInterval(() => {
                if (!quizSection.classList.contains('hidden')) {
                    const randomMsg = cheerMessages[Math.floor(Math.random() * cheerMessages.length)];
                    showToast(randomMsg);
                }
            }, 30000);
        }

        // إنشاء بطاقات الاختبارات
        function renderCards() {
            const container = document.getElementById('examCardsContainer');
            container.innerHTML = '';
            exams.forEach((exam, idx) => {
                const card = document.createElement('div');
                card.className = 'exam-card';
                card.dataset.index = idx;
                card.innerHTML = `
                    <div class="card-badge">${idx+1}</div>
                    <h3>الاختبار ${idx+1}</h3>
                    <div class="sci-icon-set">
                        <i class="fas fa-atom"></i>
                        <i class="fas fa-flask"></i>
                        <i class="fas fa-dna"></i>
                    </div>
                    <p>18 MCQ + 2 مقالي</p>
                `;
                card.addEventListener('click', () => startExam(idx));
                container.appendChild(card);
            });
        }

        function startExam(index) {
            currentExamIndex = index;
            currentQuestions = exams[index].questions;
            examFinished = false;
            currentQIndex = 0;
            userAnswers = currentQuestions.map(q => {
                if (q.type === 'mcq') return { selected: null };
                else return { essayText: '', selfCorrect: null, modelShown: false };
            });
            landing.classList.add('hidden');
            quizSection.classList.remove('hidden');
            resultPanel.classList.add('hidden');
            resultPanel.innerHTML = '';
            examTitleDisplay.textContent = exams[index].name;
            renderQuestion();
            updateNav();
            startMotivationTimer();
        }

        function renderQuestion() {
            const q = currentQuestions[currentQIndex];
            const ans = userAnswers[currentQIndex];
            let html = `<div class="meta-lesson"><i class="fas fa-microscope"></i> ${q.lesson || 'عام'}</div>`;
            html += `<div class="q-text">${currentQIndex+1}. ${q.text}</div>`;
            if (q.type === 'mcq') {
                html += `<div class="options-grid">`;
                q.options.forEach((opt, idx) => {
                    const checked = ans.selected === idx ? 'checked' : '';
                    html += `<div class="opt-item ${ans.selected===idx?'selected':''}" data-opt="${idx}">
                        <input type="radio" name="mcq" value="${idx}" ${checked}> ${opt}
                    </div>`;
                });
                html += `</div>`;
            } else {
                html += `<textarea id="essayInput" placeholder="اكتب إجابتك هنا ...">${ans.essayText}</textarea>`;
                html += `<div class="essay-toolbar">
                    <button class="btn btn-primary" id="showModelAnswerBtn"><i class="fas fa-eye"></i> عرض النموذج الإجابي</button>
                </div>`;
                if (ans.modelShown) {
                    html += `<div class="inline-answer-box"><strong>✨ الإجابة النموذجية:</strong> ${q.modelAnswer}</div>`;
                    if (ans.selfCorrect === null) {
                        html += `<div style="display:flex; gap:20px; margin-top:15px;">
                            <button class="btn btn-gold" id="selfCorrectYes">✅ نعم، إجابتي صحيحة</button>
                            <button class="btn" id="selfCorrectNo">❌ لا، كانت خاطئة</button>
                        </div>`;
                    } else {
                        const status = ans.selfCorrect ? '✅ تم إضافة الدرجة' : '❌ حسبت خطأ';
                        html += `<p style="margin-top:15px;"><i class="fas fa-check-circle"></i> ${status}</p>`;
                    }
                }
            }
            questionPanel.innerHTML = html;

            if (q.type === 'mcq') {
                document.querySelectorAll('.opt-item').forEach(el => {
                    el.addEventListener('click', (e) => {
                        const radio = el.querySelector('input');
                        if (radio) {
                            radio.checked = true;
                            const idx = parseInt(el.dataset.opt);
                            userAnswers[currentQIndex].selected = idx;
                            renderQuestion();
                        }
                    });
                });
            } else {
                const textarea = document.getElementById('essayInput');
                if (textarea) textarea.addEventListener('input', e => userAnswers[currentQIndex].essayText = e.target.value);
                document.getElementById('showModelAnswerBtn')?.addEventListener('click', () => {
                    userAnswers[currentQIndex].modelShown = true;
                    renderQuestion();
                });
                document.getElementById('selfCorrectYes')?.addEventListener('click', () => {
                    userAnswers[currentQIndex].selfCorrect = true;
                    renderQuestion();
                });
                document.getElementById('selfCorrectNo')?.addEventListener('click', () => {
                    userAnswers[currentQIndex].selfCorrect = false;
                    renderQuestion();
                });
            }
            progressDisplay.textContent = `${currentQIndex+1} / ${currentQuestions.length}`;
        }

        function updateNav() {
            prevBtn.disabled = currentQIndex === 0;
            nextBtn.disabled = currentQIndex === currentQuestions.length - 1;
        }

        prevBtn.addEventListener('click', () => { if(currentQIndex>0) { currentQIndex--; renderQuestion(); updateNav(); }});
        nextBtn.addEventListener('click', () => { if(currentQIndex<currentQuestions.length-1) { currentQIndex++; renderQuestion(); updateNav(); }});

        finishBtn.addEventListener('click', () => {
            if (examFinished) return;
            examFinished = true;
            clearInterval(toastInterval);
            calculateResult();
        });

        function calculateResult() {
            let score = 0;
            const mistakes = [];
            currentQuestions.forEach((q, idx) => {
                const ans = userAnswers[idx];
                if (q.type === 'mcq') {
                    if (ans.selected === q.answer) score++;
                    else mistakes.push({ qText: q.text, userAns: ans.selected!==null? q.options[ans.selected] : 'لم يجب', correctAns: q.options[q.answer], lesson: q.lesson });
                } else {
                    if (ans.selfCorrect === true) score++;
                    else if (ans.selfCorrect === false) mistakes.push({ qText: q.text, userAns: ans.essayText || '(فارغ)', correctAns: q.modelAnswer, lesson: q.lesson });
                    else mistakes.push({ qText: q.text, userAns: ans.essayText || 'لم يقيم', correctAns: q.modelAnswer, lesson: q.lesson });
                }
            });
            const max = currentQuestions.length;
            const msg = score >= 13 ? '🏆 بطلة! استمري يا سما' : '📚 تعلمي من الأخطاء، أنتِ قدها';
            let tableRows = '';
            mistakes.forEach(m => { tableRows += `<tr><td>${m.qText}</td><td>${m.userAns}</td><td>${m.correctAns}</td><td>${m.lesson}</td></tr>`; });
            resultPanel.innerHTML = `
                <div class="honor-text gold-glow">${score} / ${max}</div>
                <div style="font-size:2rem; text-align:center; margin:15px 0">${msg}</div>
                <h3>📋 تحليل الأخطاء</h3>
                ${mistakes.length ? `<table class="mistake-table"><tr><th>السؤال</th><th>إجابتك</th><th>الصحيح</th><th>الدرس</th></tr>${tableRows}</table>` : '<p style="color:#aad0f5">🎉 لا توجد أخطاء! أنتِ رائعة.</p>'}
            `;
            resultPanel.classList.remove('hidden');
        }

        backHomeBtn.addEventListener('click', () => {
            quizSection.classList.add('hidden');
            landing.classList.remove('hidden');
            clearInterval(toastInterval);
        });

        // بدء التشغيل
        renderCards();
        startMotivationTimer(); // رسائل تظهر حتى في الرئيسية (نوقفها عند الدخول ونعيد تشغيل)
        // عند العودة للرئيسية نوقف المؤقت القديم ونبدأ جديد
        const originalBack = backHomeBtn.addEventListener('click', () => { clearInterval(toastInterval); startMotivationTimer(); });
        window.addEventListener('load', () => showToast('💖 يا سما، أنا واثق فيكي! كملي الاختبارات.'));
    })();
</script>
</body>
  </html>
