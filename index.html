<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>تفوّق | منصة سما ومحمد 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #050a0f; background-image: radial-gradient(circle at 30% 20%, #0a1f2c 0%, #020304 100%); color: #eef4ff; min-height: 100vh; display: flex; flex-direction: column; line-height: 1.6; -webkit-tap-highlight-color: transparent; }
        .gold-glow { color: #FFDF7E; text-shadow: 0 0 12px #ffd966, 0 0 25px #ffb347; }
        .blue-glow { color: #7ad0ff; text-shadow: 0 0 8px #2196f3; }
        .app-container { max-width: 1300px; margin: 0 auto; padding: 16px 16px 8px; width: 100%; flex: 1; }
        .landing { display: flex; flex-direction: column; }
        .hero { text-align: center; margin: 20px 0 10px; }
        .hero h1 { font-size: clamp(2.4rem, 9vw, 4rem); font-weight: 900; letter-spacing: 2px; }
        .hero i { margin: 0 12px; color: #4fc3f7; filter: drop-shadow(0 0 10px #1e88e5); }
        .subhead { text-align: center; color: #b0d2f0; font-size: 1.2rem; margin-bottom: 30px; border-bottom: 1px solid #2a5570; padding-bottom: 18px; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 18px; margin: 20px 0 30px; }
        .exam-card { background: linear-gradient(145deg, #0e1c26 0%, #09131b 100%); border-radius: 30px; padding: 22px 8px 18px; text-align: center; cursor: pointer; transition: all 0.25s; border: 1.5px solid #1e4d66; box-shadow: 0 12px 20px -8px #000000e0; backdrop-filter: blur(2px); position: relative; }
        .exam-card:hover { transform: translateY(-5px); border-color: #3f9ad1; box-shadow: 0 0 20px #1e88e5a0, 0 12px 24px -8px black; }
        .card-number { font-size: 3.8rem; font-weight: 900; color: #1a445b; text-shadow: 0 0 12px #00a6ff; line-height: 1; }
        .exam-card h3 { font-size: 1.7rem; font-weight: 800; margin: 8px 0 6px; color: #e3f0fd; }
        .sci-icons { display: flex; justify-content: center; gap: 12px; margin: 10px 0 4px; font-size: 1.6rem; color: #6db3e6; }
        .quiz-view { background: #0a141e; border-radius: 38px; padding: 24px 18px 28px; border: 1px solid #265d7a; box-shadow: 0 20px 40px -5px #000000; margin-bottom: 20px; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; flex-wrap: wrap; border-bottom: 1px dashed #327a9c; padding-bottom: 16px; }
        .quiz-header h2 { font-size: 1.9rem; font-weight: 800; }
        .progress-pill { background: #103a50; padding: 8px 22px; border-radius: 40px; font-weight: 700; font-size: 1.1rem; color: #cde5ff; border: 1px solid #3d95cc; }
        .question-panel { background: #0c1a26; border-radius: 30px; padding: 26px 22px; margin: 18px 0 20px; border-right: 7px solid #2e95d4; }
        .lesson-tag { display: flex; gap: 12px; align-items: center; margin-bottom: 18px; color: #b0dcff; font-weight: 600; }
        .lesson-tag i { font-size: 1.9rem; color: #f5c542; }
        .q-text { font-size: 1.4rem; font-weight: 700; margin-bottom: 28px; line-height: 1.5; }
        .options-container { display: flex; flex-direction: column; gap: 14px; }
        .opt-item { background: #122c3b; border-radius: 22px; padding: 16px 20px; border: 2px solid #265f7c; cursor: pointer; transition: 0.15s; display: flex; align-items: center; gap: 18px; font-size: 1.15rem; }
        .opt-item.selected { background: #1a5f84; border-color: #8dcaff; box-shadow: 0 0 14px #2196f3c0; }
        .opt-item input[type="radio"] { accent-color: #fdd835; width: 20px; height: 20px; }
        textarea { width: 100%; background: #0e1f2c; border: 2px solid #2b739b; border-radius: 24px; padding: 20px; color: white; font-family: 'Cairo', sans-serif; font-size: 1.15rem; resize: vertical; min-height: 150px; }
        .essay-actions { margin: 20px 0 10px; display: flex; flex-wrap: wrap; gap: 15px; }
        .btn { background: #1a415b; border: none; color: white; padding: 12px 24px; border-radius: 50px; font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; border: 1px solid #3580aa; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 6px 10px #00000050; }
        .btn-gold { background: #9b7628; border-color: #f1c40f; color: #000; font-weight: 900; box-shadow: 0 0 18px #f1c40fcc; }
        .btn-primary { background: #1f6a9c; border-color: #7ac2f0; }
        .nav-buttons { display: flex; justify-content: space-between; margin: 28px 0 20px; }
        .result-panel { background: #0c1e2c; border-radius: 32px; padding: 28px 22px; margin-top: 30px; }
        .honor-score { font-size: 3.5rem; text-align: center; font-weight: 900; }
        .mistake-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #05121a; border-radius: 24px; overflow: hidden; }
        .mistake-table th { background: #1a4863; color: #FFD966; padding: 14px 8px; font-size: 1rem; }
        .mistake-table td { padding: 12px 8px; border-bottom: 1px solid #266080; }
        .hidden { display: none !important; }
        .back-home { margin-top: 25px; text-align: center; }
        .model-answer-box { background: #0f2c40; padding: 18px; border-radius: 22px; margin: 20px 0; border-right: 7px solid #fbc02d; }
        .footer { text-align: center; padding: 15px 0 5px; font-size: 1.5rem; font-weight: 800; }
        .toast-message { position: fixed; bottom: 25px; left: 20px; right: 20px; max-width: 420px; background: #0e2738f2; backdrop-filter: blur(12px); border-right: 10px solid #fbc02d; border-radius: 60px; padding: 18px 24px; box-shadow: 0 15px 30px #000000e0; z-index: 9999; display: flex; align-items: center; gap: 18px; font-weight: 700; font-size: 1.25rem; border: 1px solid #f1c40fc0; }
        @media (max-width: 600px) { .q-text { font-size: 1.2rem; } .quiz-header { flex-direction: column; align-items: start; } .btn { padding: 10px 18px; } }
    </style>
</head>
<body>
<div class="app-container">
    <div id="landingSection" class="landing">
        <div class="hero"><h1><i class="fas fa-flask"></i><span class="gold-glow">تفوّق</span><i class="fas fa-dna"></i></h1></div>
        <div class="subhead">اختر أحد الاختبارات السبعة • 18 اختيار + 2 مقالي</div>
        <div class="cards-grid" id="examCardsContainer"></div>
    </div>
    <div id="quizSection" class="quiz-view hidden">
        <div class="quiz-header"><h2 id="examTitle">الاختبار</h2><div class="progress-pill" id="progressIndicator">1 / 20</div></div>
        <div id="questionContainer" class="question-panel"></div>
        <div class="nav-buttons"><button class="btn" id="prevBtn" disabled><i class="fas fa-chevron-right"></i> السابق</button><button class="btn" id="nextBtn">التالي <i class="fas fa-chevron-left"></i></button></div>
        <div style="display: flex; justify-content: center;"><button class="btn btn-gold" id="finishBtn"><i class="fas fa-check-double"></i> إنهاء وعرض النتيجة</button></div>
        <div id="resultContainer" class="result-panel hidden"></div>
        <div class="back-home"><button class="btn" id="backHomeBtn"><i class="fas fa-home"></i> الرئيسية</button></div>
    </div>
    <div class="footer"><span class="gold-glow"><i class="fas fa-crown"></i> Sama&Mohamed 2026 <i class="fas fa-crown"></i></span></div>
</div>
<div id="cheerToast" style="display: none;"></div>
<script>
    (function(){
        "use strict";

        // ---------- بنك الأسئلة الجديد بالكامل (MCQ + مقالي) من الرسالة المقدمة ----------
        const mcqFullBank = [
            // الدفعة الأولى – نانو تكنولوجي + خلايا وقود + عصبي + متنوع
            { text: "المواد المركبة (Nanocomposites) تُعد مثالاً على المواد:", options: ["أحادية الأبعاد (1D)", "ثنائية الأبعاد (2D)", "ثلاثية الأبعاد (3D)", "صفرية الأبعاد (0D)"], answer: 2, lesson: "تقنية النانو" },
            { text: "أي نوع من المواد النانوية هو الأنسب لصناعة 'مرشحات دقيقة' للمياه؟", options: ["المواد النانوية المسامية 3D", "المواد صفرية الأبعاد", "الأغشية الرقيقة 2D", "النقاط الكمومية"], answer: 0, lesson: "تقنية النانو" },
            { text: "كيمياء النانو تهتم بدراسة التغيرات في الخصائص؛ أي مما يلي يقع ضمن اهتماماتها؟", options: ["تصنيع الأجهزة الضخمة", "دراسة حركة الكواكب", "تحلل اليورانيوم", "تصنيع ووصف المواد النانوية بأشكالها المختلفة"], answer: 3, lesson: "تقنية النانو" },
            { text: "إذا زاد عدد الذرات المعرضة للتفاعل على سطح المادة النانوية، فإن ذلك يؤدي إلى:", options: ["خمول كيميائي", "زيادة هائلة في النشاط الكيميائي", "تحول المادة إلى غاز", "زيادة درجة الانصهار"], answer: 1, lesson: "تقنية النانو" },
            { text: "الفائدة الأساسية من 'تغليف' دواء السرطان بجسيمات نانوية هي:", options: ["زيادة حجم الدواء ليسهل بلعه", "تغيير طعم الدواء", "تقليل فعالية الدواء ليكون آمناً", "استهداف الخلايا السرطانية فقط وحماية الخلايا السليمة"], answer: 3, lesson: "تقنية النانو" },
            { text: "أي المواد التالية هي الأكثر فعالية لعمل 'جسر نانوي' بين طرفي عصب مقطوع؟", options: ["النقاط الكمومية", "الجرافين المسطح", "أنابيب الكربون النانوية", "كرات البوكي"], answer: 2, lesson: "تقنية النانو" },
            { text: "الأطراف الصناعية الذكية تعتمد في حركتها على:", options: ["أوامر الشريحة النانوية المستشعرة للسيالات", "بطاريات ضخمة خارجية", "حركة الرياح المحيطة", "الثقل الجاذبي فقط"], answer: 0, lesson: "تقنية النانو" },
            { text: "الوقود الأساسي المستخدم في خلايا الوقود الحيوي الطبي هو:", options: ["البنزين أو الكيروسين", "غاز الهيدروجين الخارجي", "سكر الجلوكوز الموجود في الدم", "الفحم النانوي النشط"], answer: 2, lesson: "خلايا الوقود الحيوي" },
            { text: "تظهر الأغشية الرقيقة (Thin Films) كأمثلة للمواد:", options: ["أحادية الأبعاد", "ثلاثية الأبعاد", "صفرية الأبعاد", "ثنائية الأبعاد"], answer: 3, lesson: "تقنية النانو" },
            { text: "تتحرك الإلكترونات في خلية الوقود الحيوي عبر دائرة خارجية نحو:", options: ["الكاثود (القطب الموجب)", "الأنود (القطب السالب)", "النواة الخلوية", "السيتوبلازم"], answer: 0, lesson: "خلايا الوقود الحيوي" },
            { text: "دور 'أنابيب الكربون النانوية' في خلايا الوقود الحيوي هو:", options: ["تخزين السوائل الزائدة", "تغطية الأقطاب لزيادة مساحة سطح التفاعل", "منع وصول البروتونات للكاثود", "تبريد الجهاز الطبي المزروع"], answer: 1, lesson: "خلايا الوقود الحيوي" },
            { text: "أي العضيات التالية تشبه وظيفتها 'القطب الموجب' في استهلاك الأكسجين لإنتاج الماء؟", options: ["الميتوكوندريا", "الفجوة العصارية", "النواة", "الريبوسومات"], answer: 0, lesson: "خلايا الوقود الحيوي" },
            { text: "تُعتبر خلايا الوقود الحيوي 'أجهزة طبية مزروعة آمنة' لأنها:", options: ["لا تعمل إلا في الظلام", "مصنوعة من الذهب الخالص", "تستخدم الجلوكوز (وقود الجسم الطبيعي) كمصدر للطاقة", "لا تطلق أي تيار كهربائي"], answer: 2, lesson: "خلايا الوقود الحيوي" },
            { text: "تُعد الخلية العصبية الوحدة الأساسية للجهاز العصبي، ووظيفتها الأساسية هي:", options: ["إنتاج الهرمونات البروتينية", "نقل السيالات العصبية", "تخزين الطاقة الدهنية", "الدفاع المناعي عن الجسم"], answer: 1, lesson: "الجهاز العصبي" },
            { text: "تُسمى الفترة التي لا يمكن أن يتولد خلالها سيال عصبي جديد بـ:", options: ["إزالة الاستقطاب", "إعادة الاستقطاب", "فترة الجموح (الامتناع)", "جهد الراحة"], answer: 2, lesson: "الجهاز العصبي" },
            { text: "تحتاج مضخة الصوديوم والبوتاسيوم للطاقة (ATP) لأنها:", options: ["تنقل الأيونات مع تدرج التركيز", "تنقل الأيونات عكس تدرج التركيز (نقل نشط)", "تحافظ على برودة الخلية", "تمنع دخول الماء للخلية"], answer: 1, lesson: "الجهاز العصبي" },
            { text: "عند حدوث حالة 'إزالة الاستقطاب'، فإن جهد الغشاء:", options: ["يثبت عند -70 مللي فولت", "يصبح أكثر سالبية ليصل لـ -90", "يتحول من السالب إلى الموجب (+40 مللي فولت)", "ينعدم تماماً ويصل للصفر"], answer: 2, lesson: "الجهاز العصبي" },
            { text: "يعمل إنزيم الكولين إستيريز في منطقة التشابك العصبي على:", options: ["زيادة إفراز الأستيل كولين", "فتح قنوات الكالسيوم", "تحطيم الأستيل كولين ليعود الغشاء لحالة الراحة", "بناء غلاف المياليين"], answer: 2, lesson: "الجهاز العصبي" },
            { text: "ما هو الدور الأساسي للكلية في جسم الإنسان؟", options: ["إنتاج خلايا الدم الحمراء", "تنظيم تركيز الأيونات والماء في الدم", "هضم المواد الكربوهيدراتية", "إفراز الإنزيمات الهاضمة"], answer: 1, lesson: "الإخراج" },
            { text: "أي المواد الآتية يدل زيادة تركيزها في الدم على عدم كفاءة الكلية؟", options: ["اليوريا (البولة)", "الجلوكوز", "الهيموجلوبين", "الأكسجين"], answer: 0, lesson: "الإخراج" },
            { text: "جميع ما يلي يتم تكوينه أو معالجته في الكبد عدا:", options: ["تحويل الأمونيا ليوريا", "إنتاج الجلوكوز كمادة إخراجية", "تحطيم السموم", "تخزين الجليكوجين"], answer: 1, lesson: "الكبد والإخراج" },
            { text: "يتم تثبيت النيتروجين الجوي في التربة من خلال:", options: ["أشعة الشمس المباشرة", "بكتيريا العقد الجذرية في البقوليات", "عملية التنفس الخلوي", "تبخر مياه البحار"], answer: 1, lesson: "الدورات البيئية" },
            { text: "تبدأ دورة الكربون في الطبيعة بشكل أساسي من خلال عملية:", options: ["التنفس", "البناء الضوئي", "الاحتراق", "التحلل"], answer: 1, lesson: "الدورات البيئية" },
            { text: "فسر سبب زيادة إفراز العرق صيفاً؟", options: ["ضيق الشعيرات الدموية بالجلد", "اتساع الشعيرات الدموية وتنشيط الغدد العرقية لتبريد الجسم", "زيادة شرب الماء فقط", "توقف عمل الكلى صيفاً"], answer: 1, lesson: "الجلد والإخراج" },
            { text: "فسر زيادة صلابة 'نانو النحاس' مقارنة بالنحاس العادي؟", options: ["بسبب تغير لونه", "بسبب زيادة نسبة مساحة السطح إلى الحجم في مقياس النانو", "بسبب زيادة وزنه", "لأنه يصبح مادة سائلة"], answer: 1, lesson: "تقنية النانو" },
            // دفعة ثانية – أغلفة الأرض والنقل والطاقة
            { text: "أي من العمليات التالية توضح الدور الذي يقوم به الغلاف الحيوي للتأثير في مكونات الغلاف الجوي؟", options: ["امتصاص النباتات لثاني أكسيد الكربون لإنتاج الغذاء", "ثوران البراكين وانبعاث الغازات", "تبخر مياه البحار والمحيطات", "حركة الرياح وتآكل الصخور"], answer: 0, lesson: "الغلاف الحيوي" },
            { text: "يؤدي تراكم بقايا الكائنات الحية الميتة عبر ملايين السنين إلى تكوين الوقود الحفري... هذا يثبت أن:", options: ["الغلاف الجوي هو مصدر الطاقة الأساسي", "الغلاف الحيوي يساهم في تكوين موارد الغلاف الصخري", "الغلاف المائي لا يتفاعل مع الكائنات الحية", "الوقود الحفري مادة متجددة بسرعة"], answer: 1, lesson: "الغلاف الحيوي" },
            { text: "لاحظ مزارع أن محصوله ينمو بشكل أفضل في التربة التي تكثر بها ديدان الأرض... التفسير العلمي لذلك هو:", options: ["الديدان تمنع وصول الماء للجذور", "الديدان تزيد من ملوحة التربة", "الديدان تعمل على تهوية التربة وتحلل المواد العضوية", "الديدان ترفع درجة حرارة الغلاف الجوي"], answer: 2, lesson: "التربة والكائنات" },
            { text: "يبحث العلماء عن آثار كربونية قديمة في طبقات معينة... هذا النشاط العلمي يعتمد على حقيقة أن:", options: ["الكربون لا يتواجد إلا في الهواء", "الصخور لا تحتوي على أي كربون", "الكائنات الحية لا تترك أثراً بعد موتها", "بقايا الغلاف الحيوي تُحفظ وتصبح جزءاً من الغلاف الصخري"], answer: 3, lesson: "الغلاف الحيوي" },
            { text: "الوظيفة الأساسية لأنسجة الخشب في النبات هي نقل:", options: ["الغذاء الجاهز من الأوراق للجذور", "الأكسجين من الجو للأوراق", "الماء والأملاح من التربة إلى الأوراق", "الهرمونات النباتية فقط"], answer: 2, lesson: "النقل في النبات" },
            { text: "في فصل الصيف، لماذا تزداد أهمية عملية النتح للنبات؟", options: ["لأنها تساعد على تبريد الأوراق وخفض حرارتها", "لأنها تزيد من امتصاص ثاني أكسيد الكربون", "لأنها تمنع النبات من النمو الزائد", "لأنها تساعد في عملية التلقيح"], answer: 0, lesson: "النقل في النبات" },
            { text: "ظهور فقاعات هوائية داخل أوعية الخشب يسبب:", options: ["زيادة سرعة نمو النبات", "تلوين الأوراق باللون الأصفر", "زيادة امتصاص الأملاح", "إعاقة حركة عمود الماء إلى أعلى (انقطاع التماسك)"], answer: 3, lesson: "النقل في النبات" },
            { text: "الجهاز المسؤول عن نقل الأكسجين والمواد الغذائية إلى خلايا جسم الإنسان هو:", options: ["الجهاز الهضمي", "الجهاز الدوري", "الجهاز التنفسي", "الجهاز الهيكلي"], answer: 1, lesson: "الجهاز الدوري" },

            { text: "ترجع الخواص الفائقة للمواد النانوية إلى زيادة النسبة بين........", options: ["حجم المادة وكتلتها", "كتلة المادة ومساحة سطحها", "كثافة المادة وحجمها", "مساحة سطح المادة وحجمها"], answer: 3, lesson: "تقنية النانو" },
            { text: "عند تقسيم كمية من المادة إلى جسيمات في مقياس النانو، أي الخواص الآتية تظل ثابتة؟", options: ["مساحة السطح والحجم الكلي", "الذوبان والتوصيلية الكهربية", "الكتلة والحجم الكلي", "الصلابة والخواص البصرية"], answer: 2, lesson: "تقنية النانو" },
            { text: "أي مما يلي يعبر عن التغير الحادث في مساحة السطح والحجم الكلي لمكعب عند تقسيمه إلى أجزاء؟", options: ["تقل مساحة سطح المكعب ويقل الحجم", "تقل مساحة سطح المكعب ويظل الحجم ثابتاً", "تزداد مساحة سطح المكعب ويقل الحجم", "تزداد مساحة سطح المكعب ويظل الحجم ثابتاً"], answer: 3, lesson: "تقنية النانو" },
            { text: "عند مقارنة مساحة سطح برادة الحديد بمساحة سطح مكعب من الحديد لهما نفس الحجم، نجد أن........", options: ["مساحتي سطح برادة الحديد ومكعب الحديد متساويتان", "مساحة سطح مكعب الحديد أكبر", "مساحة سطح برادة الحديد أكبر", "لا يمكن تحديد الإجابة"], answer: 2, lesson: "تقنية النانو" },
            { text: "قد يتواجد الذهب في حجم النانو بجميع الألوان التالية ما عدا........", options: ["الأحمر", "البرتقالي", "الأزرق", "الأصفر"], answer: 3, lesson: "تقنية النانو" },
            { text: "أسلاك النحاس النانوية وأسلاك النحاس العادية لهما نفس........", options: ["اللون", "التوصيل الكهربي", "التركيب الكيميائي", "الصلابة"], answer: 2, lesson: "تقنية النانو" },
            { text: "كلما تقلص حجم دقائق النحاس، فإن شدة صلابته والتوصيل الكهربي له على الترتيب........", options: ["تزيد / يتغير", "تزيد / لا يتأثر", "لا تتأثر / يزيد", "لا تتأثر / لا يتأثر"], answer: 0, lesson: "تقنية النانو" },
            { text: "النسبة بين قطر حبة الرمل وقطر شعرة الإنسان........", options: ["أكبر من الواحد", "أصغر من الواحد", "تساوي الواحد", "تساوي صفر"], answer: 0, lesson: "مقاييس" },
            { text: "أي مما يلي يميز المواد النانوية المسامية؟", options: ["أبعادها الثلاثة نانوية وذات بنية نانوية", "لها بعد نانوي واحد وبعدين غير نانويين", "أبعادها الثلاثة غير نانوية وذات بنية نانوية", "لها بعدان نانويان وبعد واحد غير نانوي"], answer: 0, lesson: "تقنية النانو" },
            { text: "جميع ما يلي مواد نانوية أحادية البعد ما عدا........", options: ["الأغشية الرقيقة", "الأسلاك النانوية", "أنابيب الكربون النانوية", "الألياف النانوية"], answer: 0, lesson: "تقنية النانو" },
            { text: "أي المواد الآتية تحتوي على بعد واحد فقط غير نانوي؟", options: ["جسيمات الذهب النانوية", "أنابيب الكربون النانوية", "الأغشية الرقيقة", "النقاط الكمومية"], answer: 1, lesson: "تقنية النانو" },
            { text: "جسيم فضة نانوي له بعدين 25nm و 30nm ما البعد الثالث المحتمل لهذا الجسيم؟", options: ["60cm", "30nm", "25mm", "1000nm"], answer: 3, lesson: "تقنية النانو" },
            { text: "الأبعاد الآتية لرقيقة من الرقائق المكونة للسيراميك النانوي: 40 / 320nm / 135nm، ولهذا تعتبر هذه الرقائق من المواد النانوية........", options: ["أحادية البعد", "ثلاثية الأبعاد", "ثنائية الأبعاد", "صفرية الأبعاد"], answer: 0, lesson: "تقنية النانو" },
            { text: "أي مما يلي يمثل استخداماً للجسيمات النانوية الموجهة؟", options: ["علاج مرض السرطان", "إصلاح الأعصاب التالفة", "التحكم في الأطراف الصناعية", "خلايا الوقود الحيوي"], answer: 0, lesson: "تقنية النانو" },
            { text: "أي مما يلي يفسر وصف العلاج التقليدي للسرطان بأنه «سيف ذو حدين»؟", options: ["قد يقتل الخلايا المصابة أولاً يقتلها", "يقتل الخلايا المصابة وغير المصابة"], answer: 1, lesson: "تقنية النانو" }
        ];

        const essayFullBank = [
            { text: "ماذا يحدث عند غياب جزيئات ATP في الخلايا الحية؟", modelAnswer: "تتوقف جميع العمليات الحيوية والأنشطة الخلوية التي تحتاج إلى طاقة (مثل النقل النشط والانقباض العضلي)، مما يؤدي في النهاية إلى موت الخلية.", lesson: "الطاقة" },
            { text: "قارن بين النشا والجليكوجين من حيث أماكن تخزين كل منهما.", modelAnswer: "النشا: يُخزن في النبات (في البلاستيدات البيضاء). الجليكوجين: يُخزن في كبد وعضلات الإنسان والحيوان.", lesson: "الكربوهيدرات" },
            { text: "علل: تفرز الغدة الدرقية هرمون الثيروكسين (بروتين مرتبط).", modelAnswer: "لأنه يتكون من ارتباط الأحماض الأمينية مع عنصر اليود، وهو ضروري لعمليات التمثيل الغذائي والنمو.", lesson: "البروتينات" },
            { text: "علل: تسمى منطقة اتصال نهاية محور خلية عصبية مع جسم خلية عصبية تالية لها بـ 'التشابك العصبي'.", modelAnswer: "لأنها المنطقة التي يتم فيها انتقال السيال العصبي من خلية إلى أخرى عن طريق الناقلات الكيميائية (مثل الأستيل كولين).", lesson: "الجهاز العصبي" },
            { text: "ماذا يحدث عند غياب التواصل بين الجهاز العصبي والحواس؟", modelAnswer: "يفقد الجسم القدرة على الاستجابة للمؤثرات الخارجية، فلا يشعر بالألم أو الحرارة أو الضغط، مما يعرض الكائن الحي للخطر لعدم قدرته على التكيف مع البيئة.", lesson: "الجهاز العصبي" },
            { text: "علل: الخلية العصبية تكون مستقطبة في حالة الراحة.", modelAnswer: "بسبب التوزيع غير المتكافئ للأيونات، حيث تتركز أيونات الصوديوم (Na⁺) في الخارج وأيونات البوتاسيوم (K⁺) والبروتينات السالبة في الداخل، مما يجعل السطح الخارجي موجباً والداخلي سالباً.", lesson: "الجهاز العصبي" },
            { text: "علل: تعتبر النباتات الخضراء كائنات منتجة بينما الحيوانات كائنات مستهلكة.", modelAnswer: "لأن النباتات تصنع غذائها بنفسها بعملية البناء الضوئي (تحويل الطاقة الضوئية إلى كيميائية)، بينما تعتمد الحيوانات على غيرها في الحصول على الغذاء الجاهز.", lesson: "الطاقة والنظام البيئي" },
            { text: "ماذا يحدث عند زيادة معدل احتراق الوقود بالنسبة لتركيز ثاني أكسيد الكربون في الغلاف الجوي؟", modelAnswer: "تزداد نسبة غاز ثاني أكسيد الكربون، مما يؤدي إلى تفاقم ظاهرة الاحتباس الحراري وارتفاع درجة حرارة الأرض.", lesson: "الدورات البيئية" },
            { text: "علل: الكائنات المحللة (كائنات مجهرية) تعيد تدوير المادة وتحولها إلى عناصر معدنية بسيطة.", modelAnswer: "لأنها تتغذى على بقايا الكائنات الميتة وتفكك المركبات العضوية المعقدة إلى عناصر (مثل النيتروجين والفوسفور) تعود للتربة لتستفيد منها النباتات مرة أخرى، مما يحافظ على توازن النظام البيئي.", lesson: "الدورات البيئية" },
            { text: "علل: يزداد نشاط التفاعلات الكيميائية في الجسيمات النانوية مقارنة بالحجم العادي للمادة.", modelAnswer: "بسبب الزيادة الكبيرة في نسبة مساحة السطح إلى الحجم، مما يجعل عدد الذرات المعرضة للتفاعل كبيراً جداً، فيزيد من سرعة وكفاءة التفاعل.", lesson: "تقنية النانو" },
            { text: "ماذا يحدث عند تعرض خلايا العضلات إلى نقص أو غياب الأكسجين؟", modelAnswer: "تلجأ العضلات إلى 'التنفس اللاهوائي' (التخمر الحمضي)، مما يؤدي إلى تراكم حمض اللاكتيك الذي يسبب تعب وإجهاد العضلات.", lesson: "التنفس الخلوي" },
            { text: "علل: التغير في المحتوى الحراري (ΔH) للتفاعلات الطاردة للحرارة يكون باشارة سالبة.", modelAnswer: "لأن مجموع المحتوى الحراري للنواتج يكون أقل من مجموع المحتوى الحراري للمتفاعلات، حيث ينطلق جزء من الطاقة إلى الوسط المحيط.", lesson: "الكيمياء الحرارية" }
        ];

        // دوال مساعدة
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function generateUniqueExams() {
            const mcqShuffled = shuffle([...mcqFullBank]);
            const essayShuffled = shuffle([...essayFullBank]);
            const exams = [];
            let mcqIdx = 0, essayIdx = 0;
            for (let i = 0; i < 7; i++) {
                const questions = [];
                for (let j = 0; j < 18; j++) {
                    questions.push({ ...mcqShuffled[mcqIdx % mcqShuffled.length], type: 'mcq' });
                    mcqIdx++;
                }
                for (let k = 0; k < 2; k++) {
                    questions.push({ ...essayShuffled[essayIdx % essayShuffled.length], type: 'essay' });
                    essayIdx++;
                }
                exams.push({ name: `الاختبار ${i+1}`, questions });
            }
            return exams;
        }

        const exams = generateUniqueExams();
        // ---------- حالة التطبيق (مطابقة للنسخة السابقة) ----------
        let currentExamIndex = 0, currentQIndex = 0, userAnswers = [], examFinished = false, currentQuestions = [], toastInterval;
        const landing = document.getElementById('landingSection'), quizSection = document.getElementById('quizSection'), examTitle = document.getElementById('examTitle'), questionContainer = document.getElementById('questionContainer'), prevBtn = document.getElementById('prevBtn'), nextBtn = document.getElementById('nextBtn'), finishBtn = document.getElementById('finishBtn'), resultContainer = document.getElementById('resultContainer'), progressIndicator = document.getElementById('progressIndicator'), backHomeBtn = document.getElementById('backHomeBtn'), toastEl = document.getElementById('cheerToast');
        const cheerMessages = [ "💖 يا سمسمة، أنتِ قدها! كملي بثقة.", "🌟 شطورة يا سما، بكرة هتبقي أعظم دكتورة.", "📚 لو غلطتي اتعلمي، أنا ضهرك وسندك.", "❤️ واثق فيكي يا سما، كملي الأبطال.", "🏆 يا بطلة، كل سؤال بيقربك من حلمك.", "✨ أنتِ أذكى مما تتخيلي، يا دكتورة المستقبل.", "🌸 يا قمر، متزعليش من الغلطة، المهم نتعلم.", "🚀 كملي يا سما، أنا فخور بيكي." ];
        function showToast(text) { toastEl.style.display = 'block'; toastEl.className = 'toast-message'; toastEl.innerHTML = `<i class="fas fa-heart" style="color:#ff4d6d;"></i> ${text}`; setTimeout(() => { toastEl.style.display = 'none'; }, 4500); }
        function startCheerInterval() { if (toastInterval) clearInterval(toastInterval); toastInterval = setInterval(() => { if (!quizSection.classList.contains('hidden')) showToast(cheerMessages[Math.floor(Math.random() * cheerMessages.length)]); }, 30000); }
        function renderCards() { const container = document.getElementById('examCardsContainer'); container.innerHTML = ''; exams.forEach((exam, i) => { const card = document.createElement('div'); card.className = 'exam-card'; card.dataset.index = i; card.innerHTML = `<div class="card-number">${i+1}</div><h3>الاختبار ${i+1}</h3><div class="sci-icons"><i class="fas fa-atom"></i><i class="fas fa-flask"></i><i class="fas fa-dna"></i></div><p style="margin-top:6px;">18 MCQ + 2 مقالي</p>`; card.addEventListener('click', () => startExam(i)); container.appendChild(card); }); }
        function startExam(index) { currentExamIndex = index; currentQuestions = exams[index].questions; examFinished = false; currentQIndex = 0; userAnswers = currentQuestions.map(q => q.type==='mcq'? {selected: null} : {essayText: '', selfCorrect: null, modelShown: false}); landing.classList.add('hidden'); quizSection.classList.remove('hidden'); resultContainer.classList.add('hidden'); resultContainer.innerHTML = ''; examTitle.textContent = exams[index].name; renderQuestion(); updateNav(); startCheerInterval(); }
        function renderQuestion() { const q = currentQuestions[currentQIndex]; const ans = userAnswers[currentQIndex]; let html = `<div class="lesson-tag"><i class="fas fa-graduation-cap"></i> ${q.lesson || 'عام'}</div>`; html += `<div class="q-text">${currentQIndex+1}. ${q.text}</div>`; if (q.type === 'mcq') { html += `<div class="options-container">`; q.options.forEach((opt, idx) => { const checked = ans.selected === idx ? 'checked' : ''; html += `<div class="opt-item ${ans.selected===idx?'selected':''}" data-opt="${idx}"><input type="radio" name="mcq" value="${idx}" ${checked}> ${opt}</div>`; }); html += `</div>`; } else { html += `<textarea id="essayInput" placeholder="اكتب إجابتك هنا ...">${ans.essayText}</textarea>`; html += `<div class="essay-actions"><button class="btn btn-primary" id="showModelBtn"><i class="fas fa-eye"></i> عرض النموذج الإجابي</button></div>`; if (ans.modelShown) { html += `<div class="model-answer-box"><strong>✨ الإجابة النموذجية:</strong> ${q.modelAnswer}</div>`; if (ans.selfCorrect === null) { html += `<div style="display:flex; gap:20px; margin-top:15px;"><button class="btn btn-gold" id="selfYes">✅ نعم، إجابتي صحيحة</button><button class="btn" id="selfNo">❌ لا، كانت خاطئة</button></div>`; } else { const status = ans.selfCorrect ? '✅ تم إضافة الدرجة' : '❌ حسبت خطأ'; html += `<p style="margin-top:15px;"><i class="fas fa-check-circle"></i> ${status}</p>`; } } } questionContainer.innerHTML = html; if (q.type === 'mcq') { document.querySelectorAll('.opt-item').forEach(el => { el.addEventListener('click', (e) => { const radio = el.querySelector('input'); if (radio) { radio.checked = true; const idx = parseInt(el.dataset.opt); userAnswers[currentQIndex].selected = idx; renderQuestion(); } }); }); } else { const textarea = document.getElementById('essayInput'); if (textarea) textarea.addEventListener('input', e => userAnswers[currentQIndex].essayText = e.target.value); document.getElementById('showModelBtn')?.addEventListener('click', () => { userAnswers[currentQIndex].modelShown = true; renderQuestion(); }); document.getElementById('selfYes')?.addEventListener('click', () => { userAnswers[currentQIndex].selfCorrect = true; renderQuestion(); }); document.getElementById('selfNo')?.addEventListener('click', () => { userAnswers[currentQIndex].selfCorrect = false; renderQuestion(); }); } progressIndicator.textContent = `${currentQIndex+1} / ${currentQuestions.length}`; }
        function updateNav() { prevBtn.disabled = currentQIndex === 0; nextBtn.disabled = currentQIndex === currentQuestions.length - 1; }
        prevBtn.addEventListener('click', ()=>{ if(currentQIndex>0) { currentQIndex--; renderQuestion(); updateNav(); } });
        nextBtn.addEventListener('click', ()=>{ if(currentQIndex<currentQuestions.length-1) { currentQIndex++; renderQuestion(); updateNav(); } });
        finishBtn.addEventListener('click', ()=>{ if(examFinished) return; examFinished = true; clearInterval(toastInterval); calculateResult(); });
        function calculateResult() { let score = 0; const mistakes = []; currentQuestions.forEach((q, idx)=>{ const ans = userAnswers[idx]; if(q.type==='mcq'){ if(ans.selected === q.answer) score++; else mistakes.push({ qText: q.text, userAns: ans.selected!==null? q.options[ans.selected] : 'لم يجب', correctAns: q.options[q.answer], lesson: q.lesson }); } else { if(ans.selfCorrect === true) score++; else if(ans.selfCorrect === false) mistakes.push({ qText: q.text, userAns: ans.essayText || '(فارغ)', correctAns: q.modelAnswer, lesson: q.lesson }); else mistakes.push({ qText: q.text, userAns: ans.essayText || 'لم يقيم', correctAns: q.modelAnswer, lesson: q.lesson }); } }); const msg = score >= 13 ? '🏆 بطلة! استمري يا سما' : '📚 تعلمي من الأخطاء، أنتِ قدها'; let rows = ''; mistakes.forEach(m => { rows += `<tr><td>${m.qText}</td><td>${m.userAns}</td><td>${m.correctAns}</td><td>${m.lesson}</td></tr>`; }); resultContainer.innerHTML = `<div class="honor-score gold-glow">${score} / ${currentQuestions.length}</div><div style="font-size:2rem; text-align:center; margin:15px 0">${msg}</div><h3>📋 تحليل الأخطاء</h3>${mistakes.length ? `<table class="mistake-table"><tr><th>السؤال</th><th>إجابتك</th><th>الصحيح</th><th>الدرس</th></tr>${rows}</table>` : '<p style="color:#aad0f5">🎉 لا توجد أخطاء! أنتِ رائعة.</p>'}`; resultContainer.classList.remove('hidden'); }
        backHomeBtn.addEventListener('click', ()=>{ quizSection.classList.add('hidden'); landing.classList.remove('hidden'); clearInterval(toastInterval); });
        renderCards();
        window.addEventListener('load', ()=> showToast('💖 يا سما، أنا واثق فيكي! كملي الاختبارات.'));
    })();
</script>
